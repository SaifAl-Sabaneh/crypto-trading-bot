name: Daily Crypto Trade Execution

on:
  schedule:
    # Run daily at 00:37 UTC (3:37 AM Jordan Time) to bypass peak hour congestion
    - cron: '37 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow pushing dashboard updates back to repository

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Live Order Executor
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_SECRET_KEY: ${{ secrets.EXCHANGE_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }} # Use default runner token to push dashboard updates
        run: |
          python live_order_executor.py
