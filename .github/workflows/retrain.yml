name: Weekly Model Retraining

on:
  schedule:
    # Run every Sunday at 02:00 UTC (hands-free weekly auto-update)
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential to allow pushing updated joblib files back to repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Model Retraining
        run: |
          python train_once.py

      - name: Commit and Push Updated Models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.joblib
          git commit -m "Auto: Weekly model retraining and parameter tuning [skip ci]" || echo "No model changes to commit"
          git push origin main
